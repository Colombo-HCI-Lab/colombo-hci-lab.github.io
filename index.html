<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colombo HCI Lab — University of Colombo School of Computing</title>
  <meta name="description" content="Human-Computer Interaction research lab at UCSC, Sri Lanka. Deepfakes, AI trust and safety, and human-centered design." />
  <link rel="icon" href="/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/main.js" defer></script>
</head>
<body data-page="home">
  <main>
    <section class="hero">
      <div class="container">
        <span class="kicker">Human-Computer Interaction &middot; UCSC</span>
        <h1>Designing trustworthy technology for people</h1>
        <p id="bannerDescription"></p>
        <div class="actions">
          <a class="btn btn-primary" href="/Research/">Explore our research</a>
          <a class="btn btn-ghost" href="/Contact/">Join the lab</a>
        </div>
      </div>
    </section>

    <section class="block">
      <div class="container">
        <div class="section-head">
          <span class="kicker">Research</span>
          <h2>What we're working on</h2>
        </div>
        <div class="grid cols-4" id="projectsGrid"></div>
      </div>
    </section>

    <section class="block alt">
      <div class="container">
        <div class="section-head">
          <span class="kicker">News</span>
          <h2>Latest from the lab</h2>
        </div>
        <ul class="news-list" id="newsList"></ul>
      </div>
    </section>
  </main>
</body>
</html>
